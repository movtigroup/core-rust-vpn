name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v0.2.0)'
        required: true
        default: 'v0.2.0'

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu, x86_64-apple-darwin, x86_64-pc-windows-msvc, aarch64-apple-darwin

      - name: Install dependencies (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y libssh2-1-dev libssl-dev pkg-config

      - name: Build Linux x64
        run: cargo build --release --target x86_64-unknown-linux-gnu

      - name: Build macOS x64
        run: cargo build --release --target x86_64-apple-darwin

      - name: Build macOS ARM64
        run: cargo build --release --target aarch64-apple-darwin

      - name: Build Windows x64
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Package artifacts
        run: |
          mkdir -p release
          tar -czf release/ssh-vpn-core-${{ env.VERSION }}-x86_64-unknown-linux-gnu.tar.gz -C target/x86_64-unknown-linux-gnu/release ssh-vpn-core
          tar -czf release/ssh-vpn-core-${{ env.VERSION }}-x86_64-apple-darwin.tar.gz -C target/x86_64-apple-darwin/release ssh-vpn-core
          tar -czf release/ssh-vpn-core-${{ env.VERSION }}-aarch64-apple-darwin.tar.gz -C target/aarch64-apple-darwin/release ssh-vpn-core
          zip release/ssh-vpn-core-${{ env.VERSION }}-x86_64-pc-windows-msvc.zip target/x86_64-pc-windows-msvc/release/ssh-vpn-core.exe

      - name: Generate checksums
        run: |
          cd release
          sha256sum * > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ env.VERSION }}
          name: Release ${{ env.VERSION }}
          body: |
            Automated release for version ${{ env.VERSION }}.
            
            ## Binaries
            - `ssh-vpn-core-${{ env.VERSION }}-x86_64-unknown-linux-gnu.tar.gz` (Linux x64)
            - `ssh-vpn-core-${{ env.VERSION }}-x86_64-apple-darwin.tar.gz` (macOS x64)
            - `ssh-vpn-core-${{ env.VERSION }}-aarch64-apple-darwin.tar.gz` (macOS ARM64)
            - `ssh-vpn-core-${{ env.VERSION }}-x86_64-pc-windows-msvc.zip` (Windows x64)
            
            ## Checksums
            See `checksums.txt` in the assets.
          files: |
            release/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
